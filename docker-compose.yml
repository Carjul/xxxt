services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fb-catalog-dashboard
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      PUBLIC_BASE_URL: http://localhost:5000
      SESSION_SECRET: change-me-in-production
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: fb_catalog_dashboard
      TRICK_RUNNER_INTERVAL: 3600
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: fb-catalog-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "mongodb://127.0.0.1:27017/admin", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mongo_data:
