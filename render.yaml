services:
  - type: web
    name: fb-catalog-dashboard
    env: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: fb_catalog_dashboard
      - key: TRICK_RUNNER_INTERVAL
        value: "3600"
      - key: FB_ACCESS_TOKEN
        sync: false
